# This is a Databricks asset bundle definition for dab_project.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: dab_project

include:
  - resources/*.yml

variables:
  catalog:
    default: "citibike_dev"
  dev_flag:
    default: true

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://adb-7405617355437904.4.azuredatabricks.net

  test:
    mode: production
    variables:
      catalog:
        default: "citibike_test"
      dev_flag:
        default: false
    presets:
      name_prefix: '[testing] '
    workspace:
      host: https://adb-7405607101792283.3.azuredatabricks.net
      root_path: /Workspace/Shared/.bundle/${bundle.name}/${bundle.target}
    permissions:
      - service_principal_name: ghost9420_gmail.com#ext#@ghost9420gmail.onmicrosoft.com # update with your service principal name
        level: CAN_MANAGE
    run_as:
      service_principal_name: ghost9420_gmail.com#ext#@ghost9420gmail.onmicrosoft.com # update with your service principal name

  prod:
    mode: production
    variables:
      catalog:
        default: "citibike_prod"
      dev_flag:
        default: false
    workspace:
      host: https://adb-7405610071104341.1.azuredatabricks.net
      root_path: /Workspace/Shared/.bundle/${bundle.name}/${bundle.target}
    permissions:
      - service_principal_name: ghost9420_gmail.com#ext#@ghost9420gmail.onmicrosoft.com # update with your service principal name
        level: CAN_MANAGE
    run_as:
      service_principal_name: ghost9420_gmail.com#ext#@ghost9420gmail.onmicrosoft.com # update with your service principal name