# This is a Databricks asset bundle definition for dab_project.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: dab_project
  uuid: 06b043a7-381b-4a56-8a92-8d89a5d4165c

include:
  - resources/*.yml
  - resources/*/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://adb-7405610071104341.1.azuredatabricks.net
    variables:
      catalog: dbw_dev_useast
      schema: dev
  prod:
    mode: production
    workspace:
      host: https://adb-7405617355437904.4.azuredatabricks.net
      # We explicitly deploy to /Workspace/Users/ghost9420_gmail.com#ext#@ghost9420gmail.onmicrosoft.com to make sure we only have a single copy.
      root_path: /Workspace/Users/ghost9420_gmail.com#ext#@ghost9420gmail.onmicrosoft.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: dbw_dev_useast
      schema: prod
    permissions:
      - user_name: ghost9420_gmail.com#ext#@ghost9420gmail.onmicrosoft.com
        level: CAN_MANAGE
